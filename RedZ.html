<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:420px;
background:#1c1c1c;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff3030;
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(255,0,0,.5);
}

button:active{
transform:scale(.94);
}

textarea{
width:100%;
height:110px;
margin-bottom:15px;
border-radius:8px;
padding:10px;
resize:none;
border:none;
}

#progress{
width:100%;
height:8px;
background:#333;
border-radius:20px;
overflow:hidden;
display:none;
margin-top:15px;
}

#bar{
height:100%;
width:0%;
background:#00e676;
transition:width .1s;
}

.page{display:none}
.active{display:block}

</style>

</head>

<body>

<div class="container">

<div id="page1" class="active">

<h2>Get Script</h2>

<button id="getBtn">🚀 Get Link</button>

<div id="progress">
<div id="bar"></div>
</div>

<p id="status"></p>

</div>

<div id="page2" class="page">

<h2>Your Script</h2>

<textarea id="script" readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button id="copyBtn">📋 Copy Script</button>

</div>

</div>

<script>

const btn=document.getElementById("getBtn")
const status=document.getElementById("status")

let adOpened=false
let adStart=0

const ads=[
"https://omg10.com/4/10700946",
"https://omg10.com/4/10697514",
"https://omg10.com/4/10703023"
]

btn.onclick=openAd

function openAd(){

if(adOpened) return

let ad=ads[Math.floor(Math.random()*ads.length)]

let newTab=window.open(ad,"_blank")

if(!newTab){
location.href=ad
return
}

adOpened=true
adStart=Date.now()

status.innerText="Open Ads then return..."

}

window.addEventListener("focus",checkReturn)
document.addEventListener("visibilitychange",checkReturn)

function checkReturn(){

if(!adOpened) return

let stay=(Date.now()-adStart)/1000

if(stay<2){

status.innerText="Please stay on Ads longer"
adOpened=false
return

}

startProgress()

adOpened=false

}

function startProgress(){

let progress=document.getElementById("progress")
let bar=document.getElementById("bar")

progress.style.display="block"

let start=null

function animate(t){

if(!start) start=t

let percent=(t-start)/30

if(percent>100) percent=100

bar.style.width=percent+"%"

if(percent<100){

requestAnimationFrame(animate)

}else{

document.getElementById("page1").classList.remove("active")
document.getElementById("page2").classList.add("active")

}

}

requestAnimationFrame(animate)

}

document.getElementById("copyBtn").onclick=function(){

let text=document.getElementById("script")

if(navigator.clipboard){

navigator.clipboard.writeText(text.value)

}else{

text.select()
document.execCommand("copy")

}

alert("Copied!")

}

</script>

</body>
</html>
