<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScriptGalaxy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

color:white;
background:#050505;
min-height:100vh;

}

/* galaxy background */

body::before{

content:"";
position:fixed;

width:100%;
height:100%;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);

background-size:35px 35px,80px 80px;

opacity:0.1;

pointer-events:none;

}

/* header */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 30px;

background:#0c0c0c;

border-bottom:1px solid #222;

flex-wrap:wrap;

}

.logo{

font-size:22px;
font-weight:bold;

}

#search{

padding:10px;
border:none;
border-radius:6px;
width:220px;

}

/* layout */

.main{

display:flex;
flex-wrap:wrap;

}

/* sidebar */

.sidebar{

width:200px;

background:#0b0b0b;

padding:20px;

border-right:1px solid #222;

}

.sidebar h3{

margin-bottom:12px;

}

.sidebar ul{

list-style:none;

}

.sidebar li{

padding:10px;

border-radius:6px;

cursor:pointer;

}

.sidebar li:hover{

background:#222;

}

/* content */

.content{

flex:1;

padding:30px;

}

/* grid */

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:25px;

margin-top:20px;

}

/* card */

.card{

background:#121212;

border-radius:12px;

overflow:hidden;

border:1px solid #222;

transition:0.25s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:0 10px 25px rgba(0,0,0,0.6);

}

.card img{

width:100%;

height:180px;

object-fit:cover;

border-bottom:1px solid #222;

}

.card-body{

padding:15px;

}

.card-body h3{

margin-bottom:10px;

}

/* script box */

textarea{

width:100%;

height:70px;

background:#080808;

color:#00ff9d;

border:none;

padding:10px;

border-radius:6px;

resize:none;

}

/* buttons */

.buttons{

display:flex;

gap:8px;

margin-top:10px;

}

button{

flex:1;

padding:8px;

border:none;

border-radius:6px;

background:#1f1f1f;

color:white;

cursor:pointer;

}

button:hover{

background:white;

color:black;

}

/* counter */

.counter{

margin-top:8px;

font-size:13px;

opacity:0.7;

}

/* ad */

.ad{

margin-top:40px;

padding:30px;

text-align:center;

background:#0e0e0e;

border-radius:10px;

border:1px solid #222;

}

/* footer */

footer{

margin-top:40px;

text-align:center;

padding:20px;

background:#0c0c0c;

}

@media(max-width:750px){

.sidebar{

width:100%;

border-right:none;

border-bottom:1px solid #222;

}

}

</style>

</head>

<body>

<header>

<div class="logo">🌌 ScriptGalaxy</div>

<input id="search" placeholder="Search script...">

</header>

<div class="main">

<!-- sidebar -->

<aside class="sidebar">

<h3>Categories</h3>

<ul>

<li onclick="filterCategory('all')">All Scripts</li>
<li onclick="filterCategory('farm')">Auto Farm</li>
<li onclick="filterCategory('esp')">ESP</li>
<li onclick="filterCategory('misc')">Misc</li>

</ul>

</aside>

<section class="content">

<h2>🔥 Trending Scripts</h2>

<div class="grid">

<!-- BLOX FRUITS -->

<div class="card" data-category="farm">

<img src="https://tr.rbxcdn.com/180DAY-8c8d3e1c9cbb4b2c54c2a64e4b7f6a7e/768/432/Image/Webp/noFilter">

<div class="card-body">

<h3>🔥 Blox Fruits Auto Farm</h3>

<textarea id="script1">loadstring(game:HttpGet("https://example.com/script1"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script1','count1')">📋 Copy</button>

<button onclick="downloadScript('script1')">⬇ Download</button>

<button onclick="openBypass()">🔗 Get Link</button>

</div>

<div class="counter" id="count1">Copied 0 times</div>

</div>

</div>

<!-- ARSENAL -->

<div class="card" data-category="esp">

<img src="https://tr.rbxcdn.com/180DAY-7d4c1a7b8e63b7e0c3c6f8eab4c1a9fa/768/432/Image/Webp/noFilter">

<div class="card-body">

<h3>🎯 Arsenal ESP</h3>

<textarea id="script2">loadstring(game:HttpGet("https://example.com/script2"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script2','count2')">📋 Copy</button>

<button onclick="downloadScript('script2')">⬇ Download</button>

<button onclick="openBypass()">🔗 Get Link</button>

</div>

<div class="counter" id="count2">Copied 0 times</div>

</div>

</div>

</div>

<!-- ad -->

<div class="ad">

YOUR AD CODE HERE

</div>

</section>

</div>

<footer>

ScriptGalaxy © 2026

</footer>

<script>

let counters={}

/* copy */

function copyScript(id,counter){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

if(!counters[id]) counters[id]=0

counters[id]++

document.getElementById(counter).innerText=
"Copied "+counters[id]+" times"

}

/* download */

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

/* bypass */

function openBypass(){

window.open("https://example-bypass.com")

}

/* search */

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase()

card.style.display=title.includes(value)?"block":"none"

})

})

/* filter */

function filterCategory(category){

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

if(category==="all"||card.dataset.category===category){

card.style.display="block"

}else{

card.style.display="none"

}

})

}

</script>

</body>
</html>
