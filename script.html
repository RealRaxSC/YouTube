<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScriptVault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#020617;
color:white;
overflow-x:hidden;

}

/* animated gradient background */

body::before{

content:"";

position:fixed;

width:100%;
height:100%;

background:

radial-gradient(circle at 20% 30%, rgba(0,140,255,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,90,255,0.25), transparent 40%);

filter:blur(120px);

animation:bgmove 20s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes bgmove{

from{transform:scale(1)}
to{transform:scale(1.25)}

}

/* particles */

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

/* header */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:25px 40px;

background:rgba(0,0,0,0.6);

backdrop-filter:blur(10px);

}

.logo{

font-size:24px;
font-weight:bold;

color:#38bdf8;

text-shadow:0 0 15px #38bdf8;

}

.search{

background:#0f172a;
padding:10px 14px;
border-radius:6px;
border:none;
color:white;

}

/* hero */

.hero{

text-align:center;
padding:60px 20px;

}

.hero h1{

font-size:42px;
margin-bottom:10px;

}

.hero p{

opacity:.7;

}

/* script grid */

.container{

max-width:1200px;
margin:auto;
padding:30px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}

/* card */

.card{

background:rgba(2,6,23,0.85);

border-radius:14px;

overflow:hidden;

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 25px rgba(56,189,248,0.6);

}

.card img{

width:100%;
height:170px;
object-fit:cover;

}

.card-body{

padding:15px;

}

.card-body h3{

color:#38bdf8;
margin-bottom:10px;

}

/* script */

textarea{

width:100%;
height:70px;

background:#020617;

border:none;

color:#38bdf8;

padding:10px;

border-radius:6px;

resize:none;

}

/* buttons */

.buttons{

display:flex;
gap:8px;
margin-top:10px;

}

button{

flex:1;

padding:9px;

border:none;

border-radius:6px;

background:#0369a1;

color:white;

cursor:pointer;

transition:.2s;

}

button:hover{

background:#0ea5e9;

}

/* footer */

footer{

text-align:center;
padding:30px;
opacity:.6;

}

/* mobile */

@media(max-width:700px){

.hero h1{
font-size:32px;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<header>

<div class="logo">ScriptVault</div>

<input class="search" placeholder="Search scripts...">

</header>

<section class="hero">

<h1>Free Game Scripts</h1>
<p>Copy and use scripts instantly</p>

</section>

<div class="container">

<div class="grid">

<div class="card">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<div class="card-body">

<h3>Blox Fruits Auto Farm</h3>

<textarea id="script1">loadstring(game:HttpGet("https://example.com/script"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script1')">Copy</button>
<button onclick="downloadScript('script1')">Download</button>
<button onclick="window.open('https://rekonise.com')">Get Link</button>

</div>

</div>

</div>

</div>

</div>

<footer>

© 2026 ScriptVault

</footer>

<script>

/* copy */

function copyScript(id){

let text=document.getElementById(id).value
navigator.clipboard.writeText(text)

alert("Copied!")

}

/* download */

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="script.txt"

a.click()

}

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<100;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#38bdf8"

particles.forEach(p=>{

p.y+=p.speed

if(p.y>canvas.height) p.y=0

ctx.fillRect(p.x,p.y,p.size,p.size)

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
