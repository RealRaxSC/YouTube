<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScriptGalaxy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* GALAXY BACKGROUND */

body{

color:white;
min-height:100vh;

background:
radial-gradient(circle at 30% 20%, #1b1b2f, #000000 60%),
radial-gradient(circle at 80% 80%, #101020, #000000 70%);

overflow-x:hidden;

}

/* stars */

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:200%;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 2px, transparent 2px);

background-size:
40px 40px,
80px 80px,
120px 120px;

opacity:0.3;

animation:starMove 120s linear infinite;

pointer-events:none;

}

/* nebula glow */

body::after{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%, rgba(120,60,255,0.2), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,150,255,0.15), transparent 40%);

filter:blur(50px);

animation:nebulaMove 40s ease-in-out infinite alternate;

pointer-events:none;

}

@keyframes starMove{

from{
transform:translateY(0);
}

to{
transform:translateY(-1000px);
}

}

@keyframes nebulaMove{

from{
transform:scale(1);
}

to{
transform:scale(1.2);
}

}

/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 30px;

background:#0c0c0c;

border-bottom:1px solid #222;

flex-wrap:wrap;

}

.logo{

font-size:22px;
font-weight:bold;

}

#search{

padding:10px;

border:none;

border-radius:6px;

width:220px;

}

/* LAYOUT */

.main{

display:flex;

flex-wrap:wrap;

}

/* SIDEBAR */

.sidebar{

width:200px;

background:#0b0b0b;

padding:20px;

border-right:1px solid #222;

}

.sidebar h3{

margin-bottom:12px;

}

.sidebar ul{

list-style:none;

}

.sidebar li{

padding:10px;

border-radius:6px;

cursor:pointer;

}

.sidebar li:hover{

background:#222;

}

/* CONTENT */

.content{

flex:1;

padding:30px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:25px;

margin-top:20px;

}

/* SCRIPT CARD */

.card{

background:#121212;

border-radius:12px;

overflow:hidden;

border:1px solid #222;

transition:0.25s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:0 10px 25px rgba(0,0,0,0.6);

}

.card img{

width:100%;

height:180px;

object-fit:cover;

border-bottom:1px solid #222;

}

.card-body{

padding:15px;

}

.card-body h3{

margin-bottom:10px;

}

/* SCRIPT BOX */

textarea{

width:100%;

height:70px;

background:#080808;

color:#00ff9d;

border:none;

padding:10px;

border-radius:6px;

resize:none;

}

/* BUTTONS */

.buttons{

display:flex;

gap:8px;

margin-top:10px;

}

button{

flex:1;

padding:8px;

border:none;

border-radius:6px;

background:#1f1f1f;

color:white;

cursor:pointer;

}

button:hover{

background:white;

color:black;

}

/* COUNTER */

.counter{

margin-top:8px;

font-size:13px;

opacity:0.7;

}

/* AD BOX */

.ad{

margin-top:40px;

padding:30px;

text-align:center;

background:#0e0e0e;

border-radius:10px;

border:1px solid #222;

}

/* FOOTER */

footer{

margin-top:40px;

text-align:center;

padding:20px;

background:#0c0c0c;

}

/* MOBILE */

@media(max-width:750px){

.sidebar{

width:100%;

border-right:none;

border-bottom:1px solid #222;

}

}

</style>
</head>

<body>

<header>

<div class="logo">🌌 ScriptGalaxy</div>

<input id="search" placeholder="Search script...">

</header>

<div class="main">

<!-- SIDEBAR -->

<aside class="sidebar">

<h3>Categories</h3>

<ul>

<li onclick="filterCategory('all')">All Scripts</li>
<li onclick="filterCategory('farm')">Auto Farm</li>
<li onclick="filterCategory('esp')">ESP</li>
<li onclick="filterCategory('misc')">Misc</li>

</ul>

</aside>

<!-- CONTENT -->

<section class="content">

<h2>🔥 Trending Scripts</h2>

<div class="grid">

<!-- SCRIPT 1 -->

<div class="card" data-category="farm">

<img src="https://images.alphacoders.com/131/1310417.jpeg">

<div class="card-body">

<h3>🔥 Blox Fruits Auto Farm</h3>

<textarea id="script1">loadstring(game:HttpGet("https://example.com/script1"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script1','count1')">📋 Copy</button>
<button onclick="downloadScript('script1')">⬇ Download</button>
<button onclick="openBypass()">🔗 Get Link</button>

</div>

<div class="counter" id="count1">Copied 0 times</div>

</div>

</div>

<!-- SCRIPT 2 -->

<div class="card" data-category="esp">

<img src="https://images.alphacoders.com/132/1329093.jpeg">

<div class="card-body">

<h3>🎯 Arsenal ESP</h3>

<textarea id="script2">loadstring(game:HttpGet("https://example.com/script2"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script2','count2')">📋 Copy</button>
<button onclick="downloadScript('script2')">⬇ Download</button>
<button onclick="openBypass()">🔗 Get Link</button>

</div>

<div class="counter" id="count2">Copied 0 times</div>

</div>

</div>

</div>

<div class="ad">

YOUR AD CODE HERE

</div>

</section>

</div>

<footer>

ScriptGalaxy © 2026

</footer>

<script>

let counters={}

function copyScript(id,counter){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

if(!counters[id]) counters[id]=0

counters[id]++

document.getElementById(counter).innerText=
"Copied "+counters[id]+" times"

}

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

function openBypass(){

window.open("https://example-bypass.com")

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase()

card.style.display=title.includes(value)?"block":"none"

})

})

function filterCategory(category){

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

if(category==="all"||card.dataset.category===category){

card.style.display="block"

}else{

card.style.display="none"

}

})

}

</script>

</body>
</html>
