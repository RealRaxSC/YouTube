<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ScriptPortal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
}

header{

background:#111;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;

}

.logo{
font-size:24px;
font-weight:bold;
color:#00ffa6;
}

#search{

padding:10px;
border:none;
border-radius:6px;

width:220px;

}

.container{

padding:30px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}

.card{

background:#151515;

border-radius:12px;

overflow:hidden;

box-shadow:0 0 15px rgba(0,0,0,0.6);

position:relative;

}

.top{

position:absolute;

top:10px;
left:10px;

background:#ff003c;

padding:5px 10px;

font-size:12px;

border-radius:6px;

}

.card img{

width:100%;
height:160px;

object-fit:cover;

}

.content{

padding:15px;

}

.title{

font-size:18px;
margin-bottom:5px;

}

.game{

font-size:13px;
opacity:0.6;
margin-bottom:10px;

}

textarea{

width:100%;

height:80px;

background:#0f0f0f;

color:#00ff9d;

border:none;

padding:10px;

border-radius:6px;

resize:none;

}

.buttons{

margin-top:10px;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

}

button{

padding:9px;

border:none;

border-radius:6px;

background:#222;

color:white;

cursor:pointer;

transition:0.2s;

font-size:13px;

}

button:hover{

background:#00c97a;

}

.favorite{

position:absolute;

top:10px;
right:10px;

font-size:18px;

cursor:pointer;

}

.counter{

font-size:12px;
opacity:0.6;
margin-top:8px;

}

.ad{

margin:30px;
text-align:center;

}

footer{

margin-top:40px;

text-align:center;

padding:20px;

opacity:0.5;

}

</style>

</head>

<body>

<header>

<div class="logo">⚡ ScriptPortal</div>

<input id="search" placeholder="Search script...">

</header>


<div class="ad">

<!-- ใส่โค้ดโฆษณา Adsterra / PopAds -->

AD SPACE

</div>


<div class="container" id="scripts">

<!-- SCRIPT -->

<div class="card">

<div class="top">🔥 TOP</div>

<div class="favorite" onclick="fav(this)">⭐</div>

<img src="https://tr.rbxcdn.com/180DAY-6f54b3f6c2a8a8e4a10d6b8b1c2b2c4c/768/432/Image/Webp/noFilter">

<div class="content">

<div class="title">Auto Farm</div>

<div class="game">Game : Blox Fruits</div>

<textarea id="s1">
loadstring(game:HttpGet("https://example.com/script1"))()
</textarea>

<div class="buttons">

<button onclick="copyScript('s1')">Copy</button>

<button onclick="downloadScript('s1')">Download</button>

<button onclick="bypass()">Get Link</button>

</div>

<div class="counter" id="c1">Copies : 0</div>

</div>

</div>


<div class="card">

<div class="favorite" onclick="fav(this)">⭐</div>

<img src="https://tr.rbxcdn.com/180DAY-f1e2c3d4e5f6/768/432/Image/Webp/noFilter">

<div class="content">

<div class="title">ESP Player</div>

<div class="game">Game : Universal</div>

<textarea id="s2">
loadstring(game:HttpGet("https://example.com/script2"))()
</textarea>

<div class="buttons">

<button onclick="copyScript('s2')">Copy</button>

<button onclick="downloadScript('s2')">Download</button>

<button onclick="bypass()">Get Link</button>

</div>

<div class="counter" id="c2">Copies : 0</div>

</div>

</div>

</div>


<footer>

ScriptPortal © 2026

</footer>


<script>

let counters={}

function copyScript(id){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

alert("Script Copied")

if(!counters[id]) counters[id]=0

counters[id]++

document.getElementById("c"+id.slice(1)).innerText="Copies : "+counters[id]

}

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

function fav(el){

if(el.style.color=="gold"){

el.style.color="white"

}else{

el.style.color="gold"

}

}

function bypass(){

window.open("https://example-bypass.com")

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let title=card.querySelector(".title").innerText.toLowerCase()

if(title.includes(value)){

card.style.display="block"

}else{

card.style.display="none"

}

})

})

</script>

</body>
</html>
