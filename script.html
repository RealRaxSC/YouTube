<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScriptGalaxy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#02020a;
color:white;
overflow-x:hidden;
}

/* =========================
GALAXY BACKGROUND
========================= */

#stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-3;
}

#stars2{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
}

#nebula{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
filter:blur(80px);
opacity:0.6;
}

/* =========================
HEADER
========================= */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
}

#search{
padding:10px;
border-radius:6px;
border:none;
width:220px;
}

/* =========================
LAYOUT
========================= */

.main{
display:flex;
min-height:90vh;
}

/* sidebar */

.sidebar{
width:200px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:20px;
border-right:1px solid #222;
}

.sidebar h3{
margin-bottom:15px;
}

.sidebar li{
list-style:none;
padding:10px;
cursor:pointer;
border-radius:6px;
transition:0.2s;
}

.sidebar li:hover{
background:#1a1a30;
}

/* content */

.content{
flex:1;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
margin-top:20px;
}

/* =========================
CARD
========================= */

.card{

background:rgba(15,15,30,0.8);

border-radius:14px;

overflow:hidden;

border:1px solid rgba(255,255,255,0.05);

transition:0.35s;

position:relative;

}

.card::before{

content:"";

position:absolute;

inset:0;

background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);

opacity:0;

transition:0.4s;

}

.card:hover::before{
opacity:1;
}

.card:hover{

transform:translateY(-10px) scale(1.02);

box-shadow:0 20px 40px rgba(0,0,0,0.6);

}

.card img{

width:100%;
height:180px;
object-fit:cover;

}

.card-body{
padding:15px;
}

.card-body h3{
margin-bottom:10px;
}

/* script */

textarea{
width:100%;
height:70px;
background:#06060f;
border:none;
color:#00ffa6;
padding:10px;
border-radius:6px;
resize:none;
}

/* buttons */

.buttons{
display:flex;
gap:8px;
margin-top:10px;
}

button{
flex:1;
padding:9px;
border:none;
border-radius:6px;
background:#1c1c35;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#6c5cff;
}

/* ad */

.ad{
margin-top:40px;
padding:40px;
text-align:center;
background:rgba(0,0,0,0.6);
border-radius:10px;
}

/* footer */

footer{
text-align:center;
padding:20px;
margin-top:40px;
background:#050510;
}

/* =========================
SHOOTING STAR
========================= */

.shooting-star{
position:fixed;
width:2px;
height:80px;
background:linear-gradient(white,transparent);
opacity:0.8;
transform:rotate(45deg);
animation:shoot 5s linear infinite;
}

@keyframes shoot{

0%{
transform:translateX(-200px) translateY(-200px) rotate(45deg);
opacity:1;
}

100%{
transform:translateX(1400px) translateY(900px) rotate(45deg);
opacity:0;
}

}

/* mobile */

@media(max-width:750px){

.main{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid #222;
}

}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<canvas id="stars2"></canvas>
<canvas id="nebula"></canvas>

<div class="shooting-star"></div>
<div class="shooting-star" style="animation-delay:2s"></div>
<div class="shooting-star" style="animation-delay:4s"></div>

<header>

<div class="logo">🌌 ScriptGalaxy</div>

<input id="search" placeholder="Search script...">

</header>

<div class="main">

<aside class="sidebar">

<h3>Categories</h3>

<ul>

<li>All Scripts</li>
<li>Auto Farm</li>
<li>ESP</li>
<li>Misc</li>

</ul>

</aside>

<section class="content">

<h2>🔥 Trending Scripts</h2>

<div class="grid">

<div class="card">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<div class="card-body">

<h3>Blox Fruits Auto Farm</h3>

<textarea id="script1">loadstring(game:HttpGet("https://example.com/script1"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script1')">Copy</button>
<button onclick="downloadScript('script1')">Download</button>
<button onclick="window.open('https://rekonise.com')">Get Link</button>

</div>

</div>

</div>

<div class="card">

<img src="https://tr.rbxcdn.com/4f8e4dbcb98f8c3c94c0f9b867951376/768/432/Image/Png">

<div class="card-body">

<h3>Arsenal ESP</h3>

<textarea id="script2">loadstring(game:HttpGet("https://example.com/script2"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script2')">Copy</button>
<button onclick="downloadScript('script2')">Download</button>
<button onclick="window.open('https://rekonise.com')">Get Link</button>

</div>

</div>

</div>

</div>

<div class="ad">
PUT YOUR ADSTERRA CODE HERE
</div>

</section>

</div>

<footer>
ScriptGalaxy © 2026
</footer>

<script>

/* COPY */

function copyScript(id){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

alert("Copied!")

}

/* DOWNLOAD */

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

/* STAR PARTICLES */

function createStars(canvas,count,speed){

let ctx=canvas.getContext("2d")

let stars=[]

canvas.width=window.innerWidth
canvas.height=window.innerHeight

for(let i=0;i<count;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

s.y+=speed

if(s.y>canvas.height) s.y=0

ctx.fillRect(s.x,s.y,s.size,s.size)

})

requestAnimationFrame(animate)

}

animate()

}

createStars(document.getElementById("stars"),120,0.2)
createStars(document.getElementById("stars2"),70,0.05)

</script>

</body>
</html>
