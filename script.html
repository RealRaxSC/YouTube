<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ScriptGalaxy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#02020a;
color:white;
overflow-x:hidden;
}

/* GALAXY NEBULA */

body::before{

content:"";

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%, rgba(120,60,255,0.18), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,150,255,0.18), transparent 40%);

filter:blur(90px);

animation:nebula 40s ease-in-out infinite alternate;

z-index:-3;

}

@keyframes nebula{
from{transform:scale(1)}
to{transform:scale(1.3)}
}

/* STAR CANVAS */

#stars,#stars2{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#stars{z-index:-2}
#stars2{z-index:-1}

/* SHOOTING STAR FIX */

.shooting-star{

position:fixed;

top:-200px;
left:-200px;

width:3px;
height:140px;

background:linear-gradient(to bottom,white,transparent);

border-radius:50px;

filter:drop-shadow(0 0 6px white);

transform:rotate(-45deg);

opacity:0;

animation:shoot 7s linear infinite;

}

.shooting-star:nth-child(1){animation-delay:0s}
.shooting-star:nth-child(2){animation-delay:2s}
.shooting-star:nth-child(3){animation-delay:4s}
.shooting-star:nth-child(4){animation-delay:1s}

@keyframes shoot{

0%{
transform:translate(-200px,-200px) rotate(-45deg);
opacity:0;
}

10%{opacity:1}

100%{
transform:translate(120vw,120vh) rotate(-45deg);
opacity:0;
}

}

/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(0,0,0,0.65);

backdrop-filter:blur(10px);

border-bottom:1px solid #222;

}

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
}

#search{
padding:10px;
border-radius:6px;
border:none;
width:220px;
}

/* LAYOUT */

.main{
display:flex;
min-height:90vh;
}

.sidebar{

width:200px;

background:rgba(0,0,0,0.6);

padding:20px;

border-right:1px solid #222;

}

.sidebar h3{
margin-bottom:15px;
}

.sidebar li{

list-style:none;
padding:10px;

border-radius:6px;

cursor:pointer;

transition:.2s;

}

.sidebar li:hover{
background:#1a1a30;
}

.content{
flex:1;
padding:30px;
}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:25px;

margin-top:20px;

}

/* CARD */

.card{

background:rgba(15,15,30,0.85);

border-radius:14px;

overflow:hidden;

border:1px solid rgba(255,255,255,0.05);

transition:.35s;

}

.card:hover{

transform:translateY(-10px) scale(1.02);

box-shadow:0 20px 40px rgba(0,0,0,0.6);

}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-body h3{
margin-bottom:10px;
}

textarea{

width:100%;
height:70px;

background:#06060f;

border:none;

color:#00ffa6;

padding:10px;

border-radius:6px;

resize:none;

}

/* BUTTON */

.buttons{
display:flex;
gap:8px;
margin-top:10px;
}

button{

flex:1;

padding:9px;

border:none;

border-radius:6px;

background:#1c1c35;

color:white;

cursor:pointer;

transition:.2s;

}

button:hover{
background:#6c5cff;
}

/* AD */

.ad{

margin-top:40px;

padding:40px;

text-align:center;

background:rgba(0,0,0,0.6);

border-radius:10px;

}

/* FOOTER */

footer{

text-align:center;

padding:20px;

margin-top:40px;

background:#050510;

}

/* MOBILE */

@media(max-width:750px){

.main{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid #222;
}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>
<canvas id="stars2"></canvas>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<header>

<div class="logo">🌌 ScriptGalaxy</div>

<input id="search" placeholder="Search script...">

</header>

<div class="main">

<aside class="sidebar">

<h3>Categories</h3>

<ul>
<li>All Scripts</li>
<li>Auto Farm</li>
<li>ESP</li>
<li>Misc</li>
</ul>

</aside>

<section class="content">

<h2>🔥 Trending Scripts</h2>

<div class="grid">

<div class="card">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<div class="card-body">

<h3>Blox Fruits Auto Farm</h3>

<textarea id="script1">loadstring(game:HttpGet("https://example.com/script1"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script1')">Copy</button>

<button onclick="downloadScript('script1')">Download</button>

<button onclick="window.open('https://rekonise.com')">Get Link</button>

</div>

</div>

</div>

</div>

<div class="ad">

PUT YOUR ADSTERRA OR POPADS CODE HERE

</div>

</section>

</div>

<footer>

ScriptGalaxy © 2026

</footer>

<script>

/* COPY */

function copyScript(id){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

alert("Copied!")

}

/* DOWNLOAD */

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

/* STAR BACKGROUND */

function createStars(canvas,count,speed){

let ctx=canvas.getContext("2d")

let stars=[]

canvas.width=window.innerWidth
canvas.height=window.innerHeight

for(let i=0;i<count;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

s.y+=speed

if(s.y>canvas.height) s.y=0

ctx.fillRect(s.x,s.y,s.size,s.size)

})

requestAnimationFrame(animate)

}

animate()

}

createStars(document.getElementById("stars"),120,0.2)
createStars(document.getElementById("stars2"),70,0.05)

</script>

</body>
</html>
