<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:400px;
padding:30px;
background:#1b1b1b;
border-radius:15px;
}

button,a{
display:block;
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff2d2d;
color:white;
text-decoration:none;
cursor:pointer;
}

#progress{
width:100%;
height:8px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:20px;
display:none;
}

#bar{
height:100%;
width:0%;
background:#00ff66;
}

.page{display:none}
.page.active{display:block}

textarea{
width:100%;
height:100px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div id="page1" class="page active">

<h2>Get Link</h2>

<a id="adBtn"
href="https://omg10.com/4/10700946"
target="_blank">
🚀 Get Link
</a>

<div id="progress">
<div id="bar"></div>
</div>

</div>

<div id="page2" class="page">

<h2>Your Script</h2>

<textarea readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button onclick="copy()">Copy Script</button>

</div>

</div>

<script>

let left=false

document.addEventListener("visibilitychange",()=>{

if(document.hidden){
left=true
}else if(left){
start()
}

})

function start(){

let bar=document.getElementById("bar")
let progress=document.getElementById("progress")

progress.style.display="block"

let p=0

let timer=setInterval(()=>{

p+=2
bar.style.width=p+"%"

if(p>=100){

clearInterval(timer)

document.getElementById("page1").classList.remove("active")
document.getElementById("page2").classList.add("active")

}

},100)

}

function copy(){

let text=document.querySelector("textarea")

navigator.clipboard.writeText(text.value)

alert("Copied")

}

</script>

</body>
</html>
