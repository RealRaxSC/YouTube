<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScriptHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* animated background */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* header */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(0,0,0,0.6);

}

.logo{

font-size:22px;
font-weight:bold;

color:#38bdf8;

}

/* content */

.container{

padding:40px;

max-width:1200px;

margin:auto;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}

/* card */

.card{

background:#020617;

border-radius:12px;

overflow:hidden;

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 20px rgba(56,189,248,0.5);

}

.card img{

width:100%;
height:160px;

object-fit:cover;

}

.card-body{

padding:15px;

}

.card-body h3{

color:#38bdf8;

margin-bottom:10px;

}

/* script box */

textarea{

width:100%;
height:70px;

background:#020617;

border:none;

color:#38bdf8;

padding:10px;

border-radius:6px;

resize:none;

}

/* buttons */

.buttons{

display:flex;
gap:8px;
margin-top:10px;

}

button{

flex:1;

padding:8px;

border:none;

border-radius:6px;

background:#0369a1;

color:white;

cursor:pointer;

}

button:hover{

background:#0ea5e9;

}

/* ad */

.ad{

margin-top:50px;

padding:40px;

text-align:center;

background:#020617;

border-radius:10px;

}

/* footer */

footer{

text-align:center;

padding:20px;

margin-top:40px;

}

</style>

</head>

<script>

/* copy */

function copyScript(id){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

alert("Copied!")

}

/* download */

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

/* particles background */

const canvas=document.getElementById("particles")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<100;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#38bdf8"

particles.forEach(p=>{

p.y+=p.speed

if(p.y>canvas.height) p.y=0

ctx.fillRect(p.x,p.y,p.size,p.size)

})

requestAnimationFrame(animate)

}

animate()

</script>
