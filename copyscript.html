<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Text</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:sans-serif;
}

/* Card */
.card{
    width:320px;
    background:#1e1e1e;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    text-align:center;
}

/* Title */
.title{
    color:#fff;
    font-size:22px;
    margin-bottom:15px;
}

/* Textarea */
textarea{
    width:100%;
    height:90px;
    resize:none;
    border:none;
    outline:none;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    box-sizing:border-box;
}

/* Button */
button{
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(180deg,#ff3c3c,#ff0000);
    transition:0.2s;
    box-shadow:0 0 15px rgba(255,0,0,0.4);
}

button:hover{
    transform:scale(1.04);
    box-shadow:0 0 25px rgba(255,0,0,0.7);
}

/* Toast notification */
.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    color:#fff;
    padding:12px 20px;
    border-radius:8px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
}

.toast.show{
    opacity:1;
    bottom:50px;
}
</style>
</head>

<body>

<div class="card">

<div class="title">🔗 Your Text</div>

<textarea id="text">
อก้่้ดนกาดนกดกด
</textarea>

<button onclick="copyText()">📄 Copy Text</button>

</div>

<div id="toast" class="toast">Copied!</div>

<script>

function copyText(){

let text = document.getElementById("text").value;

navigator.clipboard.writeText(text).then(() => {

showToast("คัดลอกแล้ว");

});

}

function showToast(msg){

let toast = document.getElementById("toast");
toast.innerText = msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
