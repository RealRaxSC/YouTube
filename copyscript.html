<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Link</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0a0a0a;
    font-family:Arial;
}

/* Card */

.card{
    width:320px;
    background:#2b2b2b;
    border-radius:18px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* Title */

.title{
    color:white;
    font-size:24px;
    margin-bottom:20px;
}

/* Text Box */

.textbox{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#e6e6e6;
    font-size:14px;
    resize:none;
    outline:none;
    height:60px;
}

/* Button */

.btn{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    color:white;
    background:linear-gradient(180deg,#ff4b4b,#ff0000);
    cursor:pointer;
    transition:.2s;
}

/* Hover */

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(255,0,0,.6);
}

/* Click */

.btn:active{
    transform:scale(.96);
}

/* Glow */

.btn{
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 10px rgba(255,0,0,.3);
    }
    to{
        box-shadow:0 0 20px rgba(255,0,0,.9);
    }
}

</style>
</head>
<body>

<div class="card">

<div class="title">🔗 Your Text</div>

<textarea id="text" class="textbox">ใส่ข้อความอะไรก็ได้
รองรับหลายบรรทัด
emoji 😎🔥
หรือโค้ดก็ได้</textarea>

<button class="btn" onclick="copyText()">
📄 Copy Text
</button>

</div>

<script>

function copyText(){

let text = document.getElementById("text").value;

navigator.clipboard.writeText(text).then(()=>{

    alert("Copied successfully!");

}).catch(()=>{

    /* fallback */

    let textarea=document.createElement("textarea");
    textarea.value=text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    alert("Copied!");

});

}

</script>

</body>
</html>
