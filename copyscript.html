<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
background:#1c1c1c;
padding:30px;
border-radius:12px;
width:90%;
max-width:420px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
margin-bottom:20px;
}

#scriptBox{
background:white;
color:black;
padding:15px;
border-radius:8px;
word-break:break-all;
margin-bottom:15px;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#0d6efd;
color:white;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h2>Copy Script</h2>

<div id="scriptBox">
&lt;script src="https://yourdomain.com/gateway.js"&gt;&lt;/script&gt;
</div>

<button onclick="copyScript()">📋 Copy Script</button>

</div>

<script>

function copyScript(){

let text=document.getElementById("scriptBox").innerText;

navigator.clipboard.writeText(text);

alert("Script copied!");

}

</script>

</body>
</html>
