<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0b0b0b;
padding:30px;
border-radius:16px;
width:330px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

h2{
margin-top:0;
}

textarea{
width:100%;
height:120px;
margin-top:15px;
background:#000;
border:none;
color:#00ff9d;
padding:10px;
border-radius:10px;
resize:none;
font-size:14px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:15px;
font-size:16px;
cursor:pointer;

background:linear-gradient(90deg,#ff0000,#ff4b4b);
color:white;

transition:0.2s;
}

.btn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="box">

<h2>Copy Script</h2>

<textarea id="script" readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button class="btn" onclick="copyScript()">Copy Script</button>

<button class="btn" onclick="gotoSite()">Go To Website</button>

</div>

<script>

// ตรวจ token จากหน้า getlink
let token = localStorage.getItem("token")
let expire = localStorage.getItem("expire")

// กันเปิดตรง / bookmark
if(!token){
alert("Access denied")
window.location.href="index.html"
}

// หมดเวลา
if(Date.now() > expire){
localStorage.removeItem("token")
localStorage.removeItem("expire")
window.location.href="index.html"
}

function copyScript(){

let text = document.getElementById("script")

text.select()
text.setSelectionRange(0,99999)

navigator.clipboard.writeText(text.value)

alert("Script copied!")

}

function gotoSite(){

window.location.href="https://google.com"

}

</script>

</body>
</html>
