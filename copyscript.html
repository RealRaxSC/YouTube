<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Text</title>

<style>

/* CSS เดิมทั้งหมดเหมือนของคุณ */

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

/* floating button */

.floating-toggle{
position:fixed;
bottom:25px;
right:25px;
width:55px;
height:55px;
border-radius:50%;
border:none;
font-size:24px;
cursor:pointer;
background:linear-gradient(#ff4b4b,#ff0000);
color:white;
box-shadow:0 0 15px rgba(255,0,0,0.6);
z-index:9999;
}

.floating-menu{
position:fixed;
bottom:90px;
right:25px;
display:flex;
flex-direction:column;
gap:10px;
transition:0.3s;
}

.floating-menu.hidden{
opacity:0;
pointer-events:none;
transform:translateY(20px);
}

.float-btn{
padding:10px 16px;
border:none;
border-radius:10px;
background:white;
color:black;
cursor:pointer;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>Your Text</h2>

<textarea id="text" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/meobeo8/a/a/a"))()
</textarea>

<button id="copyBtn" onclick="copyText()">📄 Copy Text</button>

</div>

<div id="floatMenu" class="floating-menu hidden">

<button class="float-btn" onclick="window.scrollTo(0,0)">
⬆ Top
</button>

<button class="float-btn" onclick="location.reload()">
🔄 Refresh
</button>

</div>

<button class="floating-toggle" onclick="toggleMenu()">☰</button>

<script>

/* token check */

let params=new URLSearchParams(location.search)

let token=params.get("token")
let savedToken=sessionStorage.getItem("token")
let expire=sessionStorage.getItem("expire")

if(!token || token!==savedToken){
location.href="index.html"
}

if(Date.now()>expire){
location.href="index.html"
}

function copyText(){

let textarea=document.getElementById("text")
let btn=document.getElementById("copyBtn")

navigator.clipboard.writeText(textarea.value)

btn.innerText="✔ Copied"
btn.style.transform="scale(0.95)"

setTimeout(()=>{
btn.innerText="📄 Copy Text"
btn.style.transform="scale(1)"
},1500)

showToast()

sessionStorage.removeItem("token")
sessionStorage.removeItem("expire")

}

function toggleMenu(){
let menu=document.getElementById("floatMenu")
menu.classList.toggle("hidden")
}

</script>

</body>
</html>
