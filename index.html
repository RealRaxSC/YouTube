<!DOCTYPE html>
<html>
<head>
<title>Unlock Link</title>

<style>
body{
text-align:center;
font-family:Arial;
margin-top:120px;
background:#0f172a;
color:white;
}

.unlock-btn{
padding:14px 40px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff0000,#ff5050);
color:white;
cursor:pointer;
}

.unlock-btn:disabled{
background:#555;
cursor:not-allowed;
}

.timer{
font-size:18px;
margin-bottom:20px;
opacity:0.8;
}
</style>

<script>

const cooldown = 5;

function check(){

let last = localStorage.getItem("unlockTime");
let btn = document.getElementById("btn");
let timer = document.getElementById("timer");

if(!last){
btn.disabled=false;
timer.innerText="Ready";
return;
}

let diff = Math.floor((Date.now() - last)/1000);
let left = cooldown - diff;

if(left <= 0){
btn.disabled=false;
timer.innerText="Ready";
}else{

btn.disabled=true;
timer.innerText="Cooldown: "+left+"s";

let interval=setInterval(()=>{

left--;

if(left<=0){
clearInterval(interval);
btn.disabled=false;
timer.innerText="Ready";
}else{
timer.innerText="Cooldown: "+left+"s";
}

},1000);

}

}

function unlock(){

localStorage.setItem("unlockTime",Date.now());

window.open("https://omg10.com/4/10697514","_blank");

setTimeout(()=>{
location.reload();
},300);

}

window.onload = check;

</script>

</head>

<body>

<h2>🔒 Link Locked</h2>

<div id="timer" class="timer">Checking...</div>

<button id="btn" class="unlock-btn" onclick="unlock()">
🚀 Unlock Link
</button>

</body>
</html>
