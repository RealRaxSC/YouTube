<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:#000;
color:#fff;
overflow:hidden;
text-align:center;
}

/* กล่องกลาง */

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.6);
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.7);
}

#status{
margin-bottom:20px;
font-size:18px;
}

/* ปุ่ม */

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(#ff4b4b,#ff0000);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:0.2s;
}

button:hover{
transform:scale(1.04);
}

button:disabled{
background:#444;
cursor:not-allowed;
}

/* ปุ่มลิงก์ปลายทาง */

#target{
display:none;
margin-top:20px;
}

#target a{
display:block;
padding:14px;
background:#00c26e;
border-radius:10px;
color:white;
text-decoration:none;
font-size:18px;
}

/* หิมะ */

.snow{
position:fixed;
top:-10px;
color:white;
opacity:0.9;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<div class="container">

<div id="status">Click Get Link</div>

<button onclick="openAds()">🚀 Get Link</button>

<div id="target">
<a href="https://sites.google.com/view/realraxsc/home-%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%80%E0%B8%A7%E0%B9%87%E0%B8%9A%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81" target="_blank">
➡ Go To Website
</a>
</div>

</div>

<script>

let adOpened=false;

/* สร้างหิมะ */

function createSnow(){

let s=document.createElement("div");

s.className="snow";
s.innerHTML="•";

s.style.left=Math.random()*100+"%";
s.style.fontSize=(Math.random()*6+4)+"px";

let duration=Math.random()*5+5;

s.style.animationDuration=duration+"s";

document.body.appendChild(s);

setTimeout(function(){
s.remove();
},duration*1000);

}

setInterval(createSnow,120);


/* เปิด Ads */

function openAds(){

window.open("https://omg10.com/4/10697514","_blank");

adOpened=true;

document.getElementById("status").innerText="Return to this page...";

}


/* ตรวจว่าผู้ใช้กลับมา */

document.addEventListener("visibilitychange",function(){

if(!document.hidden && adOpened){

startCountdown();

adOpened=false;

}

});


/* เริ่มนับเวลา */

function startCountdown(){

let time=5;

let status=document.getElementById("status");

status.innerText="Please wait "+time+"s";

let timer=setInterval(function(){

time--;

status.innerText="Please wait "+time+"s";

if(time<=0){

clearInterval(timer);

status.innerText="Link Ready";

document.getElementById("target").style.display="block";

}

},1000);

}

</script>

</body>
</html>
