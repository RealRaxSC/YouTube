<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:#fff;
overflow:hidden;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.55);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
text-align:center;
}

#status{
margin-bottom:15px;
font-size:18px;
}

#progress{
width:100%;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
overflow:hidden;
margin-bottom:20px;
display:none;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
background-size:200% 100%;
animation:shine 1.5s linear infinite;
}

@keyframes shine{
0%{background-position:200%}
100%{background-position:-200%}
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
color:white;
cursor:pointer;
transition:all .25s;
}

button:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 10px 25px rgba(255,0,0,.6);
}

button:active{
transform:scale(.95);
}

#target{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div id="status">Click Get Link</div>

<div id="progress">
<div id="bar"></div>
</div>

<button onclick="openAds()">🚀 Get Link</button>

<div id="target">
<button onclick="goTarget()">➡ Go To Website</button>
</div>

</div>

<script>

let adOpened=false
let leftPage=false
let adStart=0

function openAds(){

window.open("https://omg10.com/4/10697514","_blank")

adOpened=true
adStart=Date.now()

document.getElementById("status").innerText="Return to this page..."

}

document.addEventListener("visibilitychange",function(){

if(document.hidden && adOpened){
leftPage=true
}

if(!document.hidden && adOpened && leftPage){

let stayTime=(Date.now()-adStart)/1000

if(stayTime<3){

document.getElementById("status").innerText="Please stay on Ads longer"

adOpened=false
leftPage=false
return

}

startCountdown()

adOpened=false
leftPage=false

}

})

function startCountdown(){

let duration=5000
let start=Date.now()

let bar=document.getElementById("bar")
let progress=document.getElementById("progress")
let status=document.getElementById("status")

progress.style.display="block"

function update(){

let now=Date.now()
let elapsed=now-start
let percent=Math.min(elapsed/duration*100,100)

bar.style.width=percent+"%"

let seconds=Math.ceil((duration-elapsed)/1000)

if(seconds>0){
status.innerText="Please wait "+seconds+"s"
}

if(percent<100){

requestAnimationFrame(update)

}else{

status.innerText="Link Ready"
progress.style.display="none"
document.getElementById("target").style.display="block"

}

}

update()

}

function goTarget(){

window.location.href="copy.html"

}

</script>

</body>
</html>
