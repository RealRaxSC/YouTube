<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#000,#444,#bbb,#444,#000);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.card{
width:90%;
max-width:420px;
background:rgba(0,0,0,.6);
padding:35px;
border-radius:15px;
text-align:center;
}

button,a{
width:100%;
display:block;
margin-top:15px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
text-decoration:none;
}

button{
background:#ff2a2a;
color:white;
}

#unlock{
display:none;
background:white;
color:black;
}

.bar{
height:8px;
background:#ff2a2a;
width:0%;
margin-top:15px;
border-radius:10px;
transition:.3s;
}

</style>
</head>

<body>

<div class="card">

<h2 id="status">Click Get Link</h2>

<button onclick="openAds()">🚀 Get Link</button>

<div class="bar" id="bar"></div>

<a id="unlock">➡ Continue</a>

</div>

<script>

function openAds(){

localStorage.setItem("adStart",Date.now())

location.href="https://omg10.com/4/10700946"

}

window.onload=()=>{

let adStart=localStorage.getItem("adStart")

if(!adStart) return

let stay=(Date.now()-adStart)/1000

localStorage.removeItem("adStart")

if(stay<3){

document.getElementById("status").innerText="Stay on Ads longer"
return

}

unlock()

}

function unlock(){

let bar=document.getElementById("bar")
let status=document.getElementById("status")
let btn=document.getElementById("unlock")

let t=5

let timer=setInterval(()=>{

t--

bar.style.width=(100-(t*20))+"%"

status.innerText="Unlocking "+t+"s"

if(t<=0){

clearInterval(timer)

status.innerText="Link Ready"

let token=Math.random().toString(36).slice(2)

sessionStorage.setItem("access",token)

btn.style.display="block"

btn.href="copy.html?token="+token

}

},1000)

}

</script>

</body>
</html>
