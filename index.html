<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

/* Japanese Black & White Background */

background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06), transparent 40%),
repeating-linear-gradient(
45deg,
#000 0px,
#000 2px,
#111 2px,
#111 6px
);

background-size:200% 200%;
animation:inkMove 18s linear infinite;
}

@keyframes inkMove{

0%{
background-position:0% 0%;
}

50%{
background-position:100% 100%;
}

100%{
background-position:0% 0%;
}

}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.65);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.8);
}

#status{
margin-bottom:15px;
font-size:18px;
}

/* Progress bar */

#progress{
width:100%;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
overflow:hidden;
margin-bottom:20px;
display:none;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#ffffff,
#bbbbbb,
#ffffff
);

background-size:200% 100%;
animation:shine 2s linear infinite;
transition:width 0.1s linear;
}

@keyframes shine{

0%{
background-position:200% 0;
}

100%{
background-position:-200% 0;
}

}

/* ปุ่ม */

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(#444,#111);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:all 0.2s ease;
}

button:hover{
transform:translateY(-3px);
}

button:active{
transform:scale(0.96);
}

/* ปุ่มปลายทาง */

#target{
display:none;
margin-top:20px;
}

#target a{
display:block;
padding:14px;
background:linear-gradient(#ffffff,#bbbbbb);
border-radius:10px;
color:black;
text-decoration:none;
font-size:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.6);
transition:all 0.2s ease;
}

#target a:hover{
transform:translateY(-3px);
}

#target a:active{
transform:scale(0.95);
}

/* Bubble */

.bubble{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,0.08);
animation:float 10s linear infinite;
}

@keyframes float{

0%{
transform:translateY(30vh) scale(0.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-20vh) scale(1);
opacity:0;
}

}

/* เส้นตก */

.line{
position:fixed;
width:2px;
height:40px;
background:rgba(255,255,255,0.2);
animation:fall 4s linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-50px);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<div id="status">Click Get Link</div>

<div id="progress">
<div id="bar"></div>
</div>

<button onclick="openAds()">🚀 Get Link</button>

<div id="target">
<a href="https://sites.google.com/view/realraxsc/home-%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%80%E0%B8%A7%E0%B9%87%E0%B8%9A%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81" target="_blank">
➡ Go To Website
</a>
</div>

</div>

<script>

let adOpened=false;

/* Bubble effect */

function createBubble(){

let b=document.createElement("div");
b.className="bubble";

let size=Math.random()*120+40;

b.style.width=size+"px";
b.style.height=size+"px";

b.style.left=Math.random()*100+"%";

document.body.appendChild(b);

setTimeout(()=>{b.remove()},10000);

}

setInterval(createBubble,600);


/* falling lines */

function createLine(){

let l=document.createElement("div");
l.className="line";

l.style.left=Math.random()*100+"%";

document.body.appendChild(l);

setTimeout(()=>{l.remove()},4000);

}

setInterval(createLine,600);


/* open ads */

function openAds(){

window.open("https://omg10.com/4/10697514","_blank");

adOpened=true;

document.getElementById("status").innerText="Return to this page...";

}


/* detect return */

document.addEventListener("visibilitychange",function(){

if(!document.hidden && adOpened){

startCountdown();

adOpened=false;

}

});


/* countdown */

function startCountdown(){

let duration=5000;
let start=Date.now();

let status=document.getElementById("status");
let progress=document.getElementById("progress");
let bar=document.getElementById("bar");

progress.style.display="block";

function update(){

let now=Date.now();
let elapsed=now-start;

let percent=Math.min(elapsed/duration*100,100);

bar.style.width=percent+"%";

let seconds=Math.ceil((duration-elapsed)/1000);

status.innerText="Please wait "+seconds+"s";

if(percent<100){

requestAnimationFrame(update);

}else{

status.innerText="Link Ready";

progress.style.display="none";

document.getElementById("target").style.display="block";

}

}

update();

}

</script>

</body>
</html>
