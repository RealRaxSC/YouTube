<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

img{
width:100%;
border-radius:10px;
}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<div class="grid" id="videos"></div>

<script>

const channel="UC6wYoQiwRAFNf9MHlvJQbKA";

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id="+channel)
.then(r=>r.json())
.then(data=>{

let html=""

data.items.slice(0,3).forEach(v=>{

let id=v.link.split("v=")[1]

html+=`
<a href="${v.link}" target="_blank">
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<p>${v.title}</p>
</a>
`

})

document.getElementById("videos").innerHTML=html

})

</script>

</body>
</html>
