```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Get Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(#0f172a,#1e293b);
color:white;
overflow:hidden;
}

/* ปุ่ม */

.btn{
padding:16px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:linear-gradient(180deg,#ff4b4b,#ff0000);
color:white;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
transition:0.2s;
}

.btn:hover{
transform:scale(1.05);
}

.btn:disabled{
background:#555;
cursor:not-allowed;
}

#status{
margin-bottom:20px;
font-size:18px;
opacity:0.9;
}

/* หิมะ */

.snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.snow span{
position:absolute;
top:-10px;
background:white;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<p id="status">Ready</p>

<button id="btn" class="btn" onclick="unlock()">
🚀 Get Link
</button>

<div class="snow" id="snow"></div>

<script>

/* สร้างหิมะ */

const snow=document.getElementById("snow");

for(let i=0;i<60;i++){

let flake=document.createElement("span");

let size=Math.random()*5+2;

flake.style.width=size+"px";
flake.style.height=size+"px";
flake.style.left=Math.random()*100+"%";
flake.style.animationDuration=(Math.random()*5+5)+"s";
flake.style.animationDelay=Math.random()*5+"s";

snow.appendChild(flake);

}

/* ระบบปุ่ม */

function unlock(){

const btn=document.getElementById("btn");
const status=document.getElementById("status");

btn.disabled=true;

window.open("https://omg10.com/4/10697514","_blank");

let time=5;

status.innerText="Please wait "+time+"s";

let timer=setInterval(()=>{

time--;

status.innerText="Please wait "+time+"s";

if(time<=0){

clearInterval(timer);

window.location.href="https://sites.google.com/view/realraxsc/home-%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%80%E0%B8%A7%E0%B9%87%E0%B8%9A%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81";

}

},1000);

}

</script>

</body>
</html>
